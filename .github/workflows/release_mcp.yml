name: Release MCP Server

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Native Executable
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: rw_git_mcp_linux_x64
          - os: macos-26-intel # x64
            artifact_name: rw_git_mcp_macos_x64
          - os: macos-latest # arm64
            artifact_name: rw_git_mcp_macos_arm64
          - os: windows-latest
            artifact_name: rw_git_mcp_windows_x64.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
          
      - name: Install dependencies
        run: dart pub get
        
      - name: Compile Executable
        run: dart build cli -t bin/rw_git_mcp.dart -o build_out
        
      - name: Archive Release Bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build_out/bundle && tar -czvf ../../${{ matrix.artifact_name }}.tar.gz *
          cp bin/rw_git_mcp ../../${{ matrix.artifact_name }}
          
      - name: Archive Release Bundle (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build_out/bundle/* -DestinationPath ${{ matrix.artifact_name }}.zip
          Copy-Item build_out/bundle/bin/rw_git_mcp.exe -Destination ${{ matrix.artifact_name }}
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}
