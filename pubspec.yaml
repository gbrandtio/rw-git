name: rw_git
description: A Dart git wrapper and MCP server that facilitates the execution of various git commands and AI repository analysis.
version: 3.0.9
repository: https://github.com/gbrandtio/rw-git

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  path: ^1.9.1
  analyzer: '>=12.1.0 <15.0.0'
  http: ^1.2.0

dev_dependencies:
  lints: ^6.1.0
  test: '>=1.25.9 <2.0.0'
  frontend_server_client: ^4.0.0
  coverage: ^1.15.1

executables:
  rw_git_mcp: rw_git_mcp

false_secrets:
  - /test/mcp/tools/security/detect_secrets_tool_test.dart
  - /test/code_quality_tracker_test.dart
