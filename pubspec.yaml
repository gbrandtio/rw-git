name: rw_git
description: A git intelligence library and MCP server, designed to provide deep intelligence via research-backed algorithms.
version: 3.4.5
repository: https://github.com/rw-core/rw-git

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  path: ^1.9.1
  analyzer: '>=12.1.0 <15.0.0'
  http: ^1.2.0

dev_dependencies:
  lints: ^6.1.0
  test: '>=1.25.9 <2.0.0'
  frontend_server_client: ^4.0.0
  coverage: ^1.15.1
  dart_style: ^3.1.8

executables:
  rw_git_mcp: rw_git_mcp

false_secrets:
  - /test/mcp/tools/security/detect_secrets_tool_test.dart
  - /test/code_quality_tracker_test.dart
